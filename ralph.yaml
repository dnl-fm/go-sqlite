version: "1"
project: github.com/fightbulc/go-turso-kit
stack:
    - go
    - turso
    - sqlite
components:
    - name: migrate
      path: cmd/migrate/
      type: cli
    - name: core
      path: internal/
      type: lib
    - name: pkg
      path: pkg/
      type: lib
back_pressure:
    test: make test
    review: rabbit review --ci
hooks:
    drift_check: true
