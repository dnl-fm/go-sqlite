# Strict Go linting - generated by ralph init
# https://golangci-lint.run/usage/configuration/
#
# Philosophy: enable-all, disable only genuinely noisy.
# Goal: catch bugs, enforce consistency, maintain high code quality.
#
# Key setting: errcheck.check-blank catches `_ = foo()` patterns.
# This prevents lazy error suppression - handle errors properly or use //nolint with justification.

version: "2"

run:
  timeout: 5m

linters:
  default: all
  disable:
    # Genuinely too noisy / not useful
    - gochecknoglobals    # globals are fine for CLI tools (config, flags)
    - gochecknoinits      # init() is fine for CLI tools (cobra, flags)
    - exhaustruct         # requiring all struct fields is excessive
    - varnamelen          # short names are idiomatic Go
    - depguard            # dependency allowlist - overkill for most projects
    - tagalign            # struct tag alignment - formatting preference
    - nlreturn            # blank line before return - formatting preference
    - wsl                 # whitespace linter - too opinionated
    - wsl_v5              # whitespace linter v5 - also too opinionated
    - err113              # requiring static errors is excessive for CLI tools
    - forbidigo           # banning fmt.Print* is too strict
    - funcorder           # function ordering is a style preference
    - godot               # comment periods - pedantic
    - gomoddirectives     # local replacements needed for monorepo
    - lll                 # line length - gofumpt handles formatting
    - paralleltest        # parallel tests not always appropriate
    - testpackage         # _test package separation not required
    - wrapcheck           # wrapping all external errors is excessive
    - nilerr              # nil error patterns can be intentional
    - nilnil              # returning nil, nil can be valid
    - mnd                 # magic numbers - too noisy
    - noctx               # context not always needed for exec.Command

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true           # KEY: Flags _ = foo() - no lazy error hiding!
      exclude-functions:
        - (io.Closer).Close       # Close errors on readers rarely actionable
        - (net/http.ResponseWriter).Write

    govet:
      enable-all: true

    gocyclo:
      min-complexity: 10

    dupl:
      threshold: 100

    goconst:
      min-len: 3
      min-occurrences: 3

    misspell:
      locale: US

    funlen:
      lines: 100
      statements: 50

    gocritic:
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style

    ireturn:
      allow:
        - anon
        - error
        - empty
        - stdlib
        - generic

    gosec:
      excludes:
        - G104                    # errcheck handles this
      config:
        global:
          audit: true

    nolintlint:
      require-explanation: true   # //nolint must explain why
      require-specific: true      # //nolint must specify which linter

    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
          arguments:
            - allowTypesBefore: "*testing.T"
        - name: context-keys-type
        - name: early-return
        - name: error-naming
        - name: error-return
        - name: exported
        - name: if-return
        - name: increment-decrement
        - name: indent-error-flow
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: var-declaration
        - name: var-naming

  exclusions:
    # Predefined exclusion presets
    presets:
      - std-error-handling
      - common-false-positives

    rules:
      # Test files can be more relaxed
      - path: _test\.go
        linters:
          - dupl
          - funlen
          - gocyclo
          - errcheck
          - goconst

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
